<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Checkout Cancelled — GRUBZ</title>
  <meta name="robots" content="noindex" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root{
      --grubz-1:#d04211; --grubz-2:#e37500; --grubz-4:#71391d;
    }
    .bg-grubz{ background: linear-gradient(135deg,var(--grubz-1),var(--grubz-2)); }
    .btn{ background: var(--grubz-1); color:#fff; border-radius:.75rem; padding:.8rem 1.1rem; font-weight:700; }
    .btn:hover{ filter: brightness(.95) }
    .btn-outline{ border:2px solid var(--grubz-1); color:var(--grubz-1); background:#fff; border-radius:.75rem; padding:.8rem 1.1rem; font-weight:700; }
  </style>
</head>
<body class="antialiased text-zinc-800">

  <!-- Top bar -->
  <header class="sticky top-0 z-50 bg-white/90 backdrop-blur border-b border-zinc-200">
      <!-- top ribbon -->
      <div class="bg-grubz text-white">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 py-2 text-sm flex items-center justify-between">
          <div class="inline-flex items-center gap-2">
            <img src="../../images/greece-flag-40.png" class="h-3.5" alt="GR flag" />
            <span data-i18n="madeInGr">Made in Greece</span>
          </div>

          <!-- language + cart -->
          <div class="flex items-center gap-2">
            <button id="lang-en" class="px-2 py-1 rounded chip">EN</button>
            <button id="lang-el" class="px-2 py-1 rounded chip">ΕΛ</button>
          </div>
        </div>
      </div>

      <!-- main nav -->
      <div class="max-w-6xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <img src="../../images/grubz-icon-80.png" alt="GRUBZ icon" class="h-14 w-14"/>
          <span class="text-2xl font-extrabold tracking-tight" style="color:var(--grubz-4)">GRUBZ</span>
        </div>
      </div>
    </header>

  <!-- Content -->
  <main class="max-w-3xl mx-auto px-4 py-14">
    <div class="text-center">
      <svg xmlns="http://www.w3.org/2000/svg" class="mx-auto mb-5" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" style="color:#ef4444">
        <circle cx="12" cy="12" r="9" stroke-width="2"></circle>
        <path stroke-linecap="round" stroke-width="2" d="M15 9l-6 6M9 9l6 6"/>
      </svg>
      <h1 class="text-3xl font-extrabold mb-2" data-i18n="title">Checkout cancelled</h1>
      <p class="text-zinc-600" data-i18n="subtitle">No charges were made. You can return to your cart and try again.</p>

      <div class="mt-10 flex flex-wrap justify-center gap-3">
        <a href="/#products" class="btn" data-i18n="back">Back to shop</a>
        <a href="mailto:info@grubz.gr" class="btn-outline" data-i18n="support">Contact support</a>
      </div>
    </div>
  </main>

  <script>
    // i18n
    const i18n = {
      en: {
        title: "Checkout cancelled",
        subtitle: "No charges were made. You can return to your cart and try again.",
        back: "Back to shop",
        support: "Contact support"
      },
      el: {
        title: "Ακύρωση πληρωμής",
        subtitle: "Δεν έγινε χρέωση. Μπορείτε να επιστρέψετε στο καλάθι και να δοκιμάσετε ξανά.",
        back: "Επιστροφή στο κατάστημα",
        support: "Υποστήριξη"
      }
    };
    const $$ = s=>document.querySelectorAll(s);
    function applyLang(lang){
      const t = i18n[lang] || i18n.en;
      $$("[data-i18n]").forEach(el => {
        const key = el.getAttribute("data-i18n");
        if (t[key]) el.textContent = t[key];
      });
      localStorage.setItem("grubz_lang", lang);
      document.documentElement.lang = (lang === "el" ? "el" : "en");
    }
    const saved = localStorage.getItem("grubz_lang") || (navigator.language.startsWith("el") ? "el" : "en");
    applyLang(saved);
    document.getElementById("lang-en").onclick = () => applyLang("en");
    document.getElementById("lang-el").onclick = () => applyLang("el");
  </script>
</body>
</html>
